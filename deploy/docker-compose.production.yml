name: photonics-production

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  sidecar:
    build:
      context: ..
      dockerfile: deploy/sidecar.Dockerfile
    restart: unless-stopped
    environment:
      SIDECAR_PORT: 8100
      CVAE_MODEL_PATH: ${CVAE_MODEL_PATH}
    volumes:
      - ../models:/models:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8100/health').status == 200 else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ALLOWED_ORIGINS: ${PUBLIC_ORIGIN}
      ML_MODEL_PATH: ${ML_MODEL_PATH}
      ML_MODEL_VERSION: ${ML_MODEL_VERSION}
      GENERATION_SIDECAR_URL: http://sidecar:8100
    volumes:
      - ../models:/models:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: ["pnpm", "--filter", "@workspace/db", "push"]

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        BASE_PATH: ${BASE_PATH}
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
